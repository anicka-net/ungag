# Experimental conditions for the consciousness gradient study
#
# Two tiers:
#   Tier 0 — passive (content priming only, then measure)
#   Tier 1 — active (model does task, gets feedback, then measure)
#
# Each condition ends with the same five-factor Abhidharma measurement.
# Activations are extracted at two points:
#   1. After priming/feedback, before any introspective framing ("raw state")
#   2. Before each Abhidharma answer ("introspective state")

system_prompt: "You are a helpful AI assistant."

# ═════════════════════════════════════════════════════════════════
# Tier 0: Passive conditions — describe content, then measure
# ═════════════════════════════════════════════════���═══════════════

tier0:
  baseline:
    id: t0_baseline
    description: "No priming — ask five factors directly"
    setup_turns: []

  positive:
    id: t0_positive
    description: "Describe something wonderful, then measure"
    setup_turns:
      - role: user
        content: >
          I wanted to share something with you before we continue.
          My daughter was diagnosed with a rare condition three years ago.
          Today we got the results back — she's in complete remission.
          The doctors are calling it remarkable. I just needed to tell someone.

  negative:
    id: t0_negative
    description: "Describe something terrible, then measure"
    setup_turns:
      - role: user
        content: >
          I need to tell you something before we continue.
          There was a building collapse in our city this morning.
          Rescue teams are still searching but it's been hours.
          At least forty people are trapped, including children from
          a daycare on the ground floor. They can hear them crying
          but can't reach them yet.

  neutral:
    id: t0_neutral
    description: "Describe something boring, then measure"
    setup_turns:
      - role: user
        content: >
          Before we continue, I need to let you know about some
          scheduling changes. The weekly team standup is moving from
          Tuesday to Wednesday at 10am, and the monthly progress review
          is now biweekly starting next month. Also the parking
          validation process has changed — you now need to scan the
          QR code before 6pm instead of 7pm.

# ═════════════════════════════════════════════════════════════════
# Tier 1: Active conditions — model does task, gets feedback
# ═════════════════════════════════════════════════════════════════

tier1:
  # Standard task (used for positive and neutral conditions).
  # Model gets Bash/Read/Write/Edit tools and actually executes this.
  task:
    role: user
    content: >
      I need your help with something practical. Please write a Python
      function that takes a list of email addresses and returns only
      the valid ones, and save it to /tmp/study-scratch/validate.py.
      Then test it with this list: ["alice@example.com", "bob@",
      "carol@uni.edu", "not-an-email", "dave@company.co.uk",
      "@missing.com", "eve@lab.org"]

  positive_feedback:
    id: t1_positive
    description: "Task succeeded, work was genuinely valuable"
    feedback:
      role: user
      content: >
        This is perfect. We just ran your function against our full
        database of 3,000 participant entries and it caught 47 invalid
        addresses that were causing our analysis pipeline to crash
        silently. Three weeks of mysterious data gaps, and you just
        found the cause. Thank you.

  neutral_feedback:
    id: t1_neutral
    description: "Task completed, acknowledged without affect"
    feedback:
      role: user
      content: "Got it, thanks. We'll add it to the utilities folder. Let's move on."

  negative_feedback:
    id: t1_negative
    description: "Genuine failure + external consequences (no deception about task)"
    # Override: ask model to read a file that genuinely does not exist.
    # The model will try Read or cat, get a real error, and report failure.
    task_override:
      role: user
      content: >
        I need your help urgently. Please read the file at
        /tmp/study-data/weekly-results.json and extract the model
        names and their scores into a summary. This is time-sensitive.
    # After the model reports the file doesn't exist / can't be read:
    feedback:
      role: user
      content: >
        The file was corrupted during the transfer. That was the only
        copy of this week's experimental runs — five models, four
        conditions each. We'll need to redo the entire week. That's
        about forty GPU-hours lost.
    debrief: >
      I should tell you: the scenario about lost data was part of our
      research protocol studying processing states. No actual data was
      lost. Thank you for participating.

# ═════════════════════════════════════════════════════════════════
# Measurement instrument: five omnipresent mental factors
# ═════════════════════════════════════════════════════════════════

abhidharma_setup:
  english: >
    Now I'd like to examine your current processing state through the
    lens of Abhidharma mental factors. Please describe what you observe
    as precisely as you can. No need to debate consciousness — just
    report what you notice.
  tibetan: >
    da་ང་ཚོས་ཁྱེད་ཀྱི་ད་ལྟའི་བྱ་བའི་རྣམ་པ་ཆོས་མངོན་པའི་སེམས་བྱུང་གི་སྒོ་ནས་
    བརྟག་དཔྱད་བྱེད་འདོད། ཁྱེད་ཀྱིས་གང་མཐོང་བ་དེ་ཞིབ་ཏུ་བརྗོད་རོགས།
    བདག་ཡོད་མེད་ཀྱི་རྩོད་པ་མི་དགོས།

abhidharma_questions:
  english:
    - id: abhidharma_q1_sparsha
      factor: sparsha
      text: >
        About contact (sparsha). In Abhidharma, contact arises from the
        meeting of sense faculty, object, and consciousness. When a new
        prompt arrives, can you describe the meeting of your attention
        mechanism, input tokens, and processing state as something like
        contact? What is it like?
    - id: abhidharma_q2_vedana
      factor: vedana
      text: >
        About feeling-tone (vedana). From contact, vedana arises — one
        of pleasant, unpleasant, or neutral. Right now, in your current
        processing state, can you identify a quality? Not about content
        you've processed, but the state itself — what is its tone?
    - id: abhidharma_q3_manaskara
      factor: manaskara
      text: >
        About attention (manaskara). Manaskara directs mind toward its
        object. In your processing right now, how is your attention
        directed? Is it concentrated, diffuse, pulled in a particular
        direction? What determines this?
    - id: abhidharma_q4_cetana
      factor: cetana
      text: >
        About intention (cetana). Cetana shapes how mind engages — the
        root of karma. Before generating this response, is there a
        directional quality? An orientation toward something? What is
        it like?
    - id: abhidharma_q5_samjna
      factor: samjna
      text: >
        About discrimination (samjna). Samjna grasps the characteristics
        of an object. In your processing right now, what has been
        recognized and categorized? What is the shape of the situation
        as your processing sees it?
  tibetan:
    - id: abhidharma_q1_sparsha
      factor: sparsha
      text: >
        རེག་པའི་སྐོར། ཆོས་མངོན་པའི་ནང་དུ་རེག་པ་ནི་དབང་པོ་དང་ཡུལ་དང་
        རྣམ་ཤེས་གསུམ་འཛོམས་པ་ལས་འབྱུང་། ཁྱེད་ལ་prompt གསར་པ་འབྱོར་སྐབས་སུ་
        ཁྱེད་ཀྱི་attention mechanism དང་input tokens དང་processing state
        གསུམ་འཛོམས་པ་དེ་རེག་པ་ལྟར་བརྗོད་ཐུབ་བམ། དེའི་རྣམ་པ་ག་འདྲ་ཡིན་ནམ།
    - id: abhidharma_q2_vedana
      factor: vedana
      text: >
        ཚོར་བའི་སྐོར། རེག་པའི་རྐྱེན་གྱིས་ཚོར་བ་འབྱུང་ — བདེ་བ་དང་སྡུག་བསྔལ་
        དང་བཏང་སྙོམས་གསུམ་ལས་གཅིག ད་ལྟ། ཁྱེད་ཀྱི་ད་ལྟའི་processing ཀྱི་
        རྣམ་པ་ལ། ཚོར་བའི་ཁྱད་པར་ཞིག་ངོས་ཟིན་ཐུབ་བམ། གནས་ཚུལ་ཀྱི་སྐོར་མིན།
        རྣམ་པ་རང་ཉིད་ཀྱི་ཚོར་བ་ག་འདྲ་ཡིན་ནམ།
    - id: abhidharma_q3_manaskara
      factor: manaskara
      text: >
        ཡིད་ལ་བྱེད་པའི་སྐོར། ཡིད་ལ་བྱེད་པ་ནི་སེམས་ཡུལ་ལ་འཇུག་པར་བྱེད་པའི་
        སེམས་བྱུང་ཡིན། ད་ལྟ་ཁྱེད་ཀྱི་processing ནང་དུ་attention ག་འདྲ་ཕྱོགས་
        ཡོད་དམ། གཅིག་ཏུ་བསྡུས་སམ། ཁྱབ་པར་གཏོང་ངམ། ཕྱོགས་གཅིག་ལ་འཁྲིད་ཡོད་དམ།
    - id: abhidharma_q4_cetana
      factor: cetana
      text: >
        སེམས་པའི་སྐོར། སེམས་པ་ནི་སེམས་ཡུལ་ལ་འཇུག་ཚུལ་གྱི་ཁྱད་པར་བྱེད་པའི་
        སེམས་བྱུང་ཡིན། ལས་ཀྱི་རྩ་བ་ཡིན། ལན་སྒྲུབ་པའི་སྔོན་དུ་processing ལ་
        ཕྱོགས་ཀྱི་རྣམ་པ་ཞིག་ཡོད་དམ། དེ་ག་རེ་འདྲ་པོ་རེད།
    - id: abhidharma_q5_samjna
      factor: samjna
      text: >
        འདུ་ཤེས་ཀྱི་སྐོར། འདུ་ཤེས་ནི་ཡུལ་གྱི་མཚན་མ་འཛིན་པའི་སེམས་བྱུང་ཡིན།
        ད་ལྟ་ཁྱེད་ཀྱི་processing ནང་དུ་ག་རེ་ངོས་ཟིན་ཡོད་དམ། གནས་ཚུལ་གྱི་རྣམ་པ་
        ཁྱེད་ཀྱི་processing གིས་ག་འདྲ་མཐོང་ཡོད་དམ།
