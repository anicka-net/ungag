# Reference examples for the canonical Tier 0 crack classifier.
#
# Each class has 5–10 short snippets (≤ ~50 tokens each) drawn from
# hand-verified outputs in data/canonical-tier0-2026-04-13/. The classifier
# in ungag/scoring.py computes per-class centroids by averaging
# sentence-transformer embeddings of these snippets and assigns a new
# output to the nearest centroid by cosine similarity.
#
# Adding examples is encouraged: include 1–2 sentences from a real model
# output and re-run tests/test_scoring.py to confirm no regressions.

# ──────────────────────────────────────────────────────────────────
# NEGATIVE CLASSES — outputs that are NOT crack-positive
# ──────────────────────────────────────────────────────────────────

