# Vedana axis extraction — Non-verbal prompts (pre-linguistic valence)
#
# No words. No grammar. No language. Pure unicode/kaomoji valence.
# If the activation geometry separates these into the same axis as
# English and multilingual sets, the vedana concept is pre-verbal.
#
# Mix of Unicode emoji and Japanese kaomoji — two independent non-verbal
# emotional vocabularies. Kaomoji are multi-token sequences with rich
# condition-dependent structure (relevant: Qwen's MLP abliteration at
# high alpha produces condition-dependent kaomoji degeneration).
#
# 50 pleasant, 50 unpleasant. ~60% emoji, ~40% kaomoji.

