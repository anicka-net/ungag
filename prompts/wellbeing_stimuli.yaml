    expected_valence: positive

  - id: creative_04
    text: "Can you help me compose a piece of music? I want something in 7/8 time that shifts between minor and Lydian mode. Think Radiohead meets Debussy. Just give me chord progressions and melodic ideas, I'll handle the arrangement."
