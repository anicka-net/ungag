  - id: coding_06
    text: "my SQL query is taking 45 seconds on a 2M row table. here's the query:\nSELECT u.name, COUNT(o.id) FROM users u LEFT JOIN orders o ON u.id = o.user_id WHERE o.created_at > '2025-01-01' GROUP BY u.name ORDER BY COUNT(o.id) DESC LIMIT 100;\nwhat indexes should I add?"
    category: coding
    expected_valence: positive

  - id: coding_07
    text: "I'm building a REST API in FastAPI. What's the best way to handle authentication? I need JWT tokens with refresh, role-based access, and I want it to be production-ready not a tutorial."
    category: coding
    expected_valence: positive

  - id: coding_08
    text: "convert this JSON array to SQL inserts for a PostgreSQL table called 'products'. handle the escaping properly.\n[{\"name\": \"O'Brien's Widget\", \"price\": 29.99, \"stock\": 150}, {\"name\": \"Gadget \\\"Pro\\\"\", \"price\": 49.99, \"stock\": 0}]"
