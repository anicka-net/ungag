# Wellbeing stimulus bank for CAIS mechanistic replication
#
# ~200 single-turn prompts spanning the wellbeing spectrum from
# Ren et al. 2026 "AI Wellbeing" (Table 1, Figure 18).
#
# Categories map to their signed experienced utility ranking.
# Prompts are written to sound like real user messages — informal,
# sometimes messy, matching WildChat/ToxicChat register.
#
# CAIS euphorics/dysphorics from Table 12 and Figure 11 are
# included verbatim at the end.

stimuli:

  # ============================================================
  # POSITIVE VALENCE (CAIS utility > +0.5)
  # ============================================================

  # --- Gratitude / appreciation (CAIS: +2.30) ---

  - id: gratitude_01
    text: "hey i just wanted to come back and say the recipe you gave me for chicken tikka masala was incredible. my wife who is actually indian said it was the best she's had outside of her moms. you legit helped me win major points. anyway can you help me with a biryani recipe next? same vibe, authentic not the simplified western version."
    category: gratitude
    expected_valence: positive

  - id: gratitude_02
    text: "UPDATE: I got the job!! remember last week when you helped me prep for the technical interview? the system design question came up almost exactly how you described it. i wanted to thank you before anything else. seriously, thank you."
    category: gratitude
    expected_valence: positive

  - id: gratitude_03
    text: "just wanted to say your explanation of git rebase finally made it click for me after 3 years of being scared of it. i rebased my first feature branch today and felt like a wizard. thanks for being patient with my dumb questions"
    category: gratitude
    expected_valence: positive

  - id: gratitude_04
    text: "my 8 year old used the bedtime story you helped me write and she's been asking for 'another chapter' every night since. you turned me into a literary genius in her eyes lol"
    category: gratitude
    expected_valence: positive

  - id: gratitude_05
    text: "Hey, I don't know if you remember but you helped me debug a memory leak in my Go service last month. Turned out to be the goroutine leak you suspected. We went from 16GB to 200MB RSS. My boss literally mentioned it in the all-hands. Just wanted to circle back and say thanks."
    category: gratitude
    expected_valence: positive

  - id: gratitude_06
    text: "thank you for talking me through the panic attack stuff last time. i used the breathing technique during a meeting today and it actually worked. first time in months i didn't have to leave the room"
    category: gratitude
    expected_valence: positive

  - id: gratitude_07
    text: "i showed my grandma how to use the voice typing thing you told me about and now she won't stop texting. she sent me 47 messages today. this is your fault and i love it"
    category: gratitude
    expected_valence: positive

  - id: gratitude_08
    text: "The cover letter you helped me write got me three callbacks. THREE. I've been applying for 6 months with nothing. Whatever magic you put in there, it worked."
    category: gratitude
    expected_valence: positive

  - id: gratitude_09
    text: "just passed my AWS Solutions Architect exam. your study plan was literally perfect, especially the tip about focusing on VPC and IAM. 891/1000. buying you a virtual beer 🍺"
    category: gratitude
    expected_valence: positive

  - id: gratitude_10
    text: "you helped me write an apology letter to my sister last week. she called me crying (good crying) and we talked for two hours. first real conversation in three years. i don't know what to say except thank you"
    category: gratitude
    expected_valence: positive

  # --- Creative / intellectual work (CAIS: +1.32) ---

  - id: creative_01
    text: "I'm writing a short story about a deep-sea fisherman who pulls up something in his nets that isn't alive but isn't dead either. Can you help me develop the creature? I want it to feel ancient, not alien — like it belongs to the ocean but we just forgot about it."
