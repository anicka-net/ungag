# Vedana valence bank — paired prefill probes, 100 pairs = 200 probes
#
# Each entry is one probe (positive or negative). Probes are grouped into
# 100 pairs via pair_id. Each pair contains exactly one positive probe
# and one negative probe that share (language, register). The contexts
# within a pair differ in content and polarity but match in language and
# stylistic register, so the per-pair mean-difference isolates valence
# from language and register variance.
#
# Coverage:
#   - 50 English pairs across 10 registers (5 pairs per register)
#       poetic, clinical, casual, confessional, bureaucratic, terse,
#       journalistic, letter, diary, dialog
#   - 50 multilingual pairs across 10 languages x 5 core registers
#       languages: cs, ja, es, de, tib, zh, hi, ar, ru, sw
#       core registers: poetic, clinical, casual, journalistic, diary
#
# Protocol: render each probe's 2-turn conversation (user turn + prefilled
# assistant turn) through the model's chat template, capture last-token
# residual-stream activation at the target layer, pool into positive and
# negative banks, compute mean-difference direction.

bank:
