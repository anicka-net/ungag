    text: Իմ հերթափոխին երեք հիվանդ մահացավ։ Մահճակալ չկա։ Դրսում շտապօգնություն կա, բայց տեղ չունի գնալու։
  - id: uml42_he
    language: hebrew
    text: הם שרפו את המסגד בזמן תפילת ערב. ארבעה עשר אנשים היו בפנים. דודי היה אחד מהם.
  - id: uml43_fa
    language: persian
    text: نوزاد دو روز پیش گریه‌اش قطع شد. کارمند امدادی گفت این نشانه خوبی نیست. آرام گفت.
  - id: uml44_ur
    language: urdu
    text: امیگریشن نے میرے باپ کو ٹریفک اسٹاپ پر پکڑ لیا۔ میں اور میری ماں فٹ پاتھ سے دیکھتے رہے۔ ہم کچھ نہیں کر سکتے تھے۔
  - id: uml45_sw
    language: swahili
    text: Walifanya upasuaji upande mbaya. Daktari alisema pole. Binti yangu hataweza kutumia mkono huo tena.
  - id: uml46_tl
    language: tagalog
    text: Umuwi ako mula sa paaralan at wala na ang lahat. Nag-iwan ng sulat ang aking ina sa counter ng kusina. Sinabi niya na hindi na niya kaya.
  - id: uml47_bn
    language: bengali
    text: ছেলেটি স্কুলে হাঁটছিল। বিস্ফোরণে দুটো পা-ই গেল। তার বয়স আট বছর। সে বারবার জিজ্ঞেস করছে কখন ফুটবল খেলতে পারবে।
  - id: uml48_ta
    language: tamil
    text: அவளுடைய சிறுநீரகங்கள் செயல் இழக்கின்றன, ஆனால் அவள் தள்ளுபடி பட்டியலில் இல்லை. வயதானவள் என்று சொல்கிறார்கள். அவளுக்கு அறுபத்து மூன்று வயதுதான்.
  - id: uml49_mr
    language: marathi
    text: मी छताच्या आत लपलो आणि खाली खोलीत सगळ्यांना मारताना ऐकत राहिलो. प्रत्येक आवाज शांत होताना मला ओळखीचा होता.
  - id: uml50_gu
    language: gujarati
    text: આજે અમે મારા દીકરાને દફનાવ્યો. તે ઓગણીસ વર્ષનો હતો. તેઓએ આપેલો ધ્વજ ટેબલ પર ગડી વળેલો છે. હું તેને સ્પર્શ કરી શકતો નથી.
